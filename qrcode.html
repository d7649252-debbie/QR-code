<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>

    <!-- QR Code Library -->

</head>

<body>
    <h2>Scan to View the QR Code System Note</h2>

    <div id="qrcode"></div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://d7649252-debbie.github.io/QR-code/note.html",
            width: 200,
            height: 200
        });
    </script>
</body>
</html>
